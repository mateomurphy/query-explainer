name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }} / MySQL ${{ matrix.mysql }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          # 3.2 is the floor in the gemspec, 3.4 is what the consuming app runs
          - '3.2'
          - '3.4'
          - '4.0'
        mysql:
          - '5.6'
          - '8.0'

    services:
      mysql:
        image: mysql:${{ matrix.mysql }}
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: root

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      # mysql2 builds a native extension against this
      - name: Install MySQL client headers
        run: sudo apt-get update && sudo apt-get install -y default-libmysqlclient-dev
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run the default task
        run: bundle exec rake
